<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drone Vision Nav Demo State</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070a;
        color: #d8dee9;
      }
      body {
        align-items: center;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      main {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid #203041;
        background: #0d141d;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        color: #8ea2b8;
        line-height: 1.55;
      }
      button, a {
        align-items: center;
        background: rgba(104, 199, 230, 0.1);
        border: 1px solid rgba(104, 199, 230, 0.45);
        color: #a7e8f7;
        cursor: pointer;
        display: inline-flex;
        font-weight: 700;
        gap: 8px;
        margin-right: 8px;
        padding: 10px 14px;
        text-decoration: none;
        text-transform: uppercase;
      }
      code {
        color: #a7e8f7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Seed Drone Vision Nav Demo State</h1>
      <p>
        This page writes browser-local demo data for the Windows UI preview only.
        It does not connect to hardware, SSH, MAVLink, PX4, or a Raspberry Pi.
      </p>
      <p>
        After seeding, open the app and use <code>Drone</code> to select the demo Pi.
      </p>
      <button id="seed">Load demo state</button>
      <a href="/dashboard">Open app</a>
    </main>
    <script>
      document.getElementById("seed").addEventListener("click", () => {
        localStorage.setItem("drone_dev_profile", JSON.stringify({
          name: "Test Operator",
          email: "",
          org: "Drone Vision Nav",
          accent_color: "#68C7E6",
          onboarding_complete: true
        }));
        localStorage.setItem("drone_dev_devices", JSON.stringify([
          {
            id: "demo-pi5",
            name: "Demo Raspberry Pi 5",
            kind: "pi5",
            host: "dronecompute.local",
            port: 22,
            username: "user",
            remote_project_path: "/home/user/Drone",
            mavlink_endpoint: "serial:/dev/ttyAMA0:921600",
            autopilot: "px4",
            runtime_profile: "pi5_full",
            camera_profile: "rgb_global_shutter"
          },
          {
            id: "demo-local",
            name: "Local Planning Profile",
            kind: "local",
            autopilot: "px4",
            runtime_profile: "desktop_high_compute",
            camera_profile: "rgb_global_shutter"
          }
        ]));
        localStorage.setItem("drone_dev_regions", JSON.stringify([
          {
            id: "demo-sf-map",
            name: "Demo San Francisco Map",
            lat_min: 37.760,
            lat_max: 37.812,
            lon_min: -122.520,
            lon_max: -122.386,
            zoom: 17,
            source: "esri",
            output_path: "C:/DroneVisionNav/maps/demo-san-francisco",
            last_downloaded: new Date().toISOString(),
            tile_count: 144,
            gsd_m_per_px: 0.6,
            georef_source: "demo",
            georef_confidence: 0.92,
            georef_crs: "EPSG:4326",
            lifecycle_state: "active",
            active_bundle_path: "C:/DroneVisionNav/maps/demo-san-francisco/mission_bundle",
            active_bundle_state: "active",
            feature_count: 32000,
            estimated_pi_runtime_cost: "moderate",
            runtime_profile: "pi5_full",
            camera_profile: "rgb_global_shutter"
          }
        ]));
        localStorage.setItem("drone_camera_calibration_state", "captured");
        localStorage.setItem("vision_nav_position_udp_port", "17660");
        window.location.href = "/dashboard";
      });
    </script>
  </body>
</html>
